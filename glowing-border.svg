<svg viewBox="0 0 800 150" width="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur1" />
      <feGaussianBlur stdDeviation="15" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <linearGradient id="rainbow-top" x1="0%" y1="100%" x2="100%" y2="0%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="25%" stop-color="#4facfe" />
      <stop offset="50%" stop-color="#ff007f" />
      <stop offset="75%" stop-color="#7f00ff" />
      <stop offset="100%" stop-color="#00ff87" />
    </linearGradient>
  </defs>
  <style>
    .track { stroke: #121318; stroke-width: 4; fill: none; }
    .laser {
      stroke: url(#rainbow-top);
      stroke-width: 5;
      stroke-dasharray: 500 1500;
      animation: run-clockwise 4s linear infinite;
      fill: none;
    }
    @keyframes run-clockwise {
      0% { stroke-dashoffset: 2000; }
      100% { stroke-dashoffset: 0; }
    }
  </style>
  <path d="M 10,150 L 10,20 Q 10,10 20,10 L 780,10 Q 790,10 790,20 L 790,150" class="track" />
  <path d="M 10,150 L 10,20 Q 10,10 20,10 L 780,10 Q 790,10 790,20 L 790,150" class="laser" filter="url(#neon-glow)" />
</svg>
