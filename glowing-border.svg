<svg viewBox="0 0 850 480" width="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="laser-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur1" />
      <feGaussianBlur stdDeviation="12" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="rainbow-stream" x1="0%" y1="0%" x2="100%" y2="100%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="25%" stop-color="#4facfe" />
      <stop offset="50%" stop-color="#ff007f" />
      <stop offset="75%" stop-color="#7f00ff" />
      <stop offset="100%" stop-color="#00ff87" />
    </linearGradient>
  </defs>

  <style>
    /* Base configuration matching GitHub dark mode styling */
    .bg-panel { fill: #0d1117; }
    .track-line { stroke: #161b22; stroke-width: 4; fill: none; }
    
    /* The continuous clock-wise laser animation */
    .laser-train {
      stroke: url(#rainbow-stream);
      stroke-width: 5;
      stroke-dasharray: 600 2000;
      animation: completeLoop 5s linear infinite;
      fill: none;
    }
    
    @keyframes completeLoop {
      0% { stroke-dashoffset: 2600; }
      100% { stroke-dashoffset: 0; }
    }

    /* Embedded text styles to preserve layout scaling */
    .title-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 26px; font-weight: 700; fill: #ffffff; }
    .sub-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 600; fill: #58a6ff; }
    .body-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 15px; fill: #c9d1d9; }
    .bold-text { font-weight: bold; fill: #ffffff; }
  </style>

  <rect x="15" y="15" width="820" height="450" rx="16" class="bg-panel" />
  <rect x="15" y="15" width="820" height="450" rx="16" class="track-line" />

  <g transform="translate(45, 60)">
    <text x="0" y="0" class="title-text">I'm Amaan! Not too easy to find someone like me ..</text>
    
    <text x="0" y="45" class="sub-title">🎓 Engineering Student @ MGIT Hyderabad</text>
    <text x="0" y="75" class="body-text">Converting bugs to butterflies.. 😁 curiosity dives into me when an error occurs.</text>
    
    <text x="0" y="130" class="sub-title">🛠️ My Current Skills</text>
    <g transform="translate(0, 150)">
      <rect x="0" y="0" width="90" height="30" rx="6" fill="#3776AB" />
      <text x="45" y="20" font-family="sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">PYTHON</text>

      <rect x="105" y="0" width="50" height="30" rx="6" fill="#00599C" />
      <text x="130" y="20" font-family="sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">C</text>

      <rect x="165" y="0" width="95" height="30" rx="6" fill="#150458" />
      <text x="212" y="20" font-family="sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">PANDAS</text>

      <rect x="275" y="0" width="70" height="30" rx="6" fill="#4479A1" />
      <text x="310" y="20" font-family="sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">SQL</text>
    </g>

    <line x1="0" y1="215" x2="760" y2="215" stroke="#21262d" stroke-width="2" />

    <text x="0" y="255" class="sub-title">🚀 The Mindset | Beyond the Code</text>
    <text x="0" y="290" class="body-text"><tspan class="bold-text">Current Mission:</tspan> Automating my entire digital existence</text>
    <text x="30" y="325" class="body-text">Trying to solve my own problems by creating them ..</text>
  </g>

  <rect x="15" y="15" width="820" height="450" rx="16" class="laser-train" filter="url(#laser-glow)" />
</svg>
